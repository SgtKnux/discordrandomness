<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Leverage</title>
  <style>
    :root {
      --bg-1: #080b18;
      --bg-2: #151a38;
      --cyan: #7df9ff;
      --violet: #9f7aea;
      --rose: #ff7ad9;
      --text: #f6f7fb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(125, 249, 255, 0.16), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(255, 122, 217, 0.16), transparent 26%),
        radial-gradient(circle at 50% 90%, rgba(159, 122, 234, 0.2), transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .aurora {
      position: fixed;
      inset: -40%;
      background:
        conic-gradient(
          from 180deg,
          transparent,
          rgba(125, 249, 255, 0.22),
          rgba(159, 122, 234, 0.28),
          rgba(255, 122, 217, 0.22),
          transparent
        );
      filter: blur(80px);
      animation: drift 18s linear infinite;
      opacity: 0.75;
    }

    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
      animation: gridMove 9s linear infinite;
    }

    .orb {
      position: fixed;
      width: 18rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(125,249,255,0.3) 22%, rgba(159,122,234,0.12) 52%, transparent 72%);
      filter: blur(1px);
      opacity: 0.35;
      animation: float 10s ease-in-out infinite alternate;
    }

    .orb.one { top: 8%; left: 8%; }
    .orb.two {
      right: 10%;
      bottom: 7%;
      width: 24rem;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.9), rgba(255,122,217,0.28) 24%, rgba(159,122,234,0.12) 56%, transparent 74%);
      animation-delay: -4s;
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(92vw, 980px);
      padding: clamp(2rem, 6vw, 5rem);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 34px;
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.055));
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(22px) saturate(150%);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent 20%, rgba(125,249,255,0.38), rgba(255,122,217,0.32), transparent 80%);
      transform: translateX(-80%);
      animation: shimmer 7s ease-in-out infinite;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 32px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.13), transparent 45%);
      pointer-events: none;
    }

    h1 {
      position: relative;
      z-index: 1;
      max-width: 14ch;
      font-size: clamp(2.7rem, 8vw, 7rem);
      line-height: 0.93;
      letter-spacing: -0.075em;
      text-wrap: balance;
      text-shadow: 0 0 36px rgba(125, 249, 255, 0.18);
    }

    .gradient-text {
      background: linear-gradient(90deg, #ffffff, var(--cyan), var(--violet), var(--rose), #ffffff);
      background-size: 260% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: textGlow 8s ease-in-out infinite;
    }

    .sparkles span {
      position: fixed;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 14px rgba(125,249,255,0.9);
      animation: sparkle 5s ease-in-out infinite;
    }

    .sparkles span:nth-child(1) { top: 18%; left: 22%; animation-delay: 0s; }
    .sparkles span:nth-child(2) { top: 32%; left: 74%; animation-delay: 1.1s; }
    .sparkles span:nth-child(3) { top: 70%; left: 18%; animation-delay: 2.2s; }
    .sparkles span:nth-child(4) { top: 78%; left: 82%; animation-delay: 3.1s; }
    .sparkles span:nth-child(5) { top: 12%; left: 58%; animation-delay: 4s; }

    @keyframes drift {
      to { transform: rotate(360deg); }
    }

    @keyframes gridMove {
      to { background-position: 48px 48px; }
    }

    @keyframes float {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(42px, -30px, 0) scale(1.08); }
    }

    @keyframes shimmer {
      0%, 35% { transform: translateX(-85%); opacity: 0; }
      50% { opacity: 1; }
      75%, 100% { transform: translateX(85%); opacity: 0; }
    }

    @keyframes textGlow {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(0.4); opacity: 0.2; }
      50% { transform: scale(1.6); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid"></div>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <div class="sparkles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <main class="card">
    <h1><span class="gradient-text">@labubu It's especially easy once you learn enough to leverage AI for your benefit.</span></h1>
  </main>
</body>
</html>
